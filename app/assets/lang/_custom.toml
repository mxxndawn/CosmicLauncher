welcomeHeader = "WELCOME TO CosmicLauncher"
welcomeDescription = "2011년, 초록창 카페의 작은 서버로 시작한 Cookie Server는 다양한 콘텐츠와 함께 언제나 즐거움을 느낄 수 있는 유저들의 소중한 보금자리였습니다. 그리고 다시 시작하는 Cookie Server는 과거의 추억을 이어가면서도, 예전보다 더 다채로운 콘텐츠와 흥미로운 모드를 통해 새로운 재미를 선사하고자 합니다. 이곳은 단순히 게임을 즐기는 공간을 넘어, 수많은 사람들과 교류하며 함께 이야기를 만들어가는 커뮤니티의 한 장소가 될 것입니다. 오랜 시간 기억에 남을 추억과 새로운 만남이 공존하는 곳, 그곳이 바로 우리가 다시 만들어가는 Cookie Server입니다."
welcomeDescCTA = "쿠키서버와 함께 즐거운 시간 되시길 바랍니다."
